<!doctype html>
<html lang="en">

<head>
    <base href="/rpg-game/" />
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>2d world RPG</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      background: linear-gradient(-45deg, #1a0033, #330066, #1a0033, #330066);
      background-size: 400% 400%;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        radial-gradient(circle at 20% 30%, rgba(170, 0, 255, 0.3) 1px, transparent 1px),
        radial-gradient(circle at 60% 70%, rgba(170, 0, 255, 0.2) 1px, transparent 1px),
        radial-gradient(circle at 80% 20%, rgba(170, 0, 255, 0.25) 1px, transparent 1px);
      background-size: 200px 200px, 150px 150px, 180px 180px;
      animation: float 20s ease-in-out infinite;
      pointer-events: none;
    }

    @keyframes float {

      0%,
      100% {
        transform: translateY(0px);
      }

      50% {
        transform: translateY(-20px);
      }
    }

    @keyframes pulse-glow {

      0%,
      100% {
        box-shadow: 0 0 20px rgba(170, 0, 255, 0.4);
      }

      50% {
        box-shadow: 0 0 40px rgba(170, 0, 255, 0.8);
      }
    }

    #canvas {
      border: 3px solid #aa00ff;
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      animation: pulse-glow 3s ease-in-out infinite;
      z-index: 2;
    }

    .assets {
      display: none;
    }

    #camera-controls {
      position: absolute;
      bottom: 20px;
      right: 20px;
      background: rgba(0, 0, 0, 0.7);
      border: 2px solid #aa00ff;
      border-radius: 8px;
      padding: 15px;
      color: white;
      font-family: sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      z-index: 10;
      box-shadow: 0 0 15px rgba(170, 0, 255, 0.5);
    }

    #info-panel {
      position: absolute;
      top: 20px;
      right: 20px;
      background: rgba(0, 0, 0, 0.7);
      border: 2px solid #aa00ff;
      border-radius: 8px;
      padding: 15px;
      color: white;
      font-family: sans-serif;
      display: flex;
      flex-direction: column;
      gap: 15px;
      z-index: 100;
      pointer-events: auto;
      box-shadow: 0 0 15px rgba(170, 0, 255, 0.5);
      min-width: 150px;
      max-height: 85vh;
      overflow-y: auto;
    }

    #info-panel::-webkit-scrollbar {
      width: 8px;
    }

    #info-panel::-webkit-scrollbar-track {
      background: rgba(0, 0, 0, 0.3);
      border-radius: 4px;
    }

    #info-panel::-webkit-scrollbar-thumb {
      background: rgba(170, 0, 255, 0.5);
      border-radius: 4px;
    }

    #info-panel::-webkit-scrollbar-thumb:hover {
      background: rgba(170, 0, 255, 0.8);
    }

    #spawn-controls {
      position: absolute;
      top: 20px;
      left: 20px;
      background: rgba(0, 0, 0, 0.7);
      border: 2px solid #aa00ff;
      border-radius: 8px;
      padding: 15px;
      color: white;
      font-family: sans-serif;
      display: flex;
      flex-direction: column;
      gap: 10px;
      z-index: 100;
      box-shadow: 0 0 15px rgba(170, 0, 255, 0.5);
    }

    #spawn-controls h3 {
      margin: 0 0 5px 0;
      color: #e0b3ff;
      font-size: 16px;
      text-align: center;
    }

    .spawn-btn {
      background: #330066;
      border: 1px solid #aa00ff;
      color: white;
      border-radius: 4px;
      padding: 8px 12px;
      cursor: pointer;
      font-size: 13px;
      transition: all 0.2s;
      font-weight: bold;
      text-align: center;
    }

    .spawn-btn:hover {
      background: #aa00ff;
      box-shadow: 0 0 10px rgba(170, 0, 255, 0.8);
      transform: translateY(-1px);
    }

    .spawn-btn:active {
      transform: translateY(0);
    }

    .hero-info {
      border-bottom: 1px solid rgba(170, 0, 255, 0.3);
      padding-bottom: 10px;
      transition: background 0.2s, border-color 0.2s;
      padding: 10px;
      border-radius: 4px;
    }

    .hero-info.active-hero {
      background: rgba(170, 0, 255, 0.4);
      border: 2px solid #e0b3ff;
    }

    .active-toggle-btn {
      background: #330066;
      border: 1px solid #aa00ff;
      color: white;
      border-radius: 4px;
      padding: 4px 8px;
      cursor: pointer;
      font-size: 12px;
      transition: background 0.2s, color 0.2s;
      font-weight: bold;
    }

    .active-toggle-btn:hover {
      background: #aa00ff;
    }

    .active-toggle-btn.is-active {
      background: #aa00ff;
      color: #fff;
      cursor: default;
    }

    .hero-info:last-child {
      border-bottom: none;
    }

    .hero-info h3 {
      margin: 0 0 5px 0;
      color: #e0b3ff;
      font-size: 16px;
    }

    .hero-info p {
      margin: 2px 0;
      font-size: 14px;
      display: flex;
      justify-content: space-between;
    }

    .stat-value {
      font-weight: bold;
      color: #fff;
    }

    .stat-bar-container {
      width: 100%;
      height: 6px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 3px;
      overflow: hidden;
    }

    .family-group {
      border: 1px solid rgba(170, 0, 255, 0.5);
      border-radius: 6px;
      padding: 10px;
      background: rgba(20, 0, 40, 0.6);
      margin-bottom: 0px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .family-group:last-child {
      margin-bottom: 0;
    }

    .family-header {
      font-size: 14px;
      color: #e0b3ff;
      margin: 0;
      text-align: center;
      text-transform: uppercase;
      letter-spacing: 1px;
      border-bottom: 1px dashed rgba(170, 0, 255, 0.5);
      padding-bottom: 5px;
      font-weight: bold;
    }

    .stat-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .stat-row svg {
      flex-shrink: 0;
    }

    .stat-bar-fill {
      height: 100%;
      transition: width 0.3s ease;
    }

    .health-fill {
      background: #ff4757;
    }

    .energy-fill {
      background: #2ed573;
    }

    .anger-fill {
      background: #ffa502;
    }

    .fertility-fill {
      background: #e0b3ff;
    }

    .social-fill {
      background: #1e90ff;
    }

    .dpad {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 5px;
    }

    .dpad button {
      background: #330066;
      border: 1px solid #aa00ff;
      color: white;
      width: 30px;
      height: 30px;
      border-radius: 4px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
    }

    .dpad button:hover {
      background: #aa00ff;
    }

    .zoom-controls {
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 100%;
      margin-top: 10px;
    }

    .zoom-controls input {
      width: 100%;
      margin-top: 5px;
    }

    #top-stats-panel {
      position: absolute;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0, 0, 0, 0.7);
      border: 2px solid #aa00ff;
      border-radius: 8px;
      padding: 10px 20px;
      color: white;
      font-family: sans-serif;
      display: flex;
      align-items: center;
      gap: 30px;
      z-index: 100;
      box-shadow: 0 0 15px rgba(170, 0, 255, 0.5);
      font-weight: bold;
    }

    .top-stat-item {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 16px;
    }

    .top-stat-title {
      color: #e0b3ff;
      font-size: 18px;
      margin-right: 15px;
      padding-right: 15px;
      border-right: 1px solid rgba(170, 0, 255, 0.5);
      white-space: nowrap;
    }
  </style>
</head>

<body>
  <canvas id="canvas"></canvas>

  <div id="camera-controls">
    <div class="dpad">
      <div></div>
      <button id="camera-up">↑</button>
      <div></div>
      <button id="camera-left">←</button>
      <button id="camera-reset">⟲</button>
      <button id="camera-right">→</button>
      <div></div>
      <button id="camera-down">↓</button>
      <div></div>
    </div>
    <div class="zoom-controls">
      <label for="camera-zoom">Zoom</label>
      <input type="range" id="camera-zoom" min="0.5" max="3" step="0.1" value="1">
    </div>
  </div>

  <div id="spawn-controls">
    <h3>Spawner</h3>
    <button class="spawn-btn" id="spawn-small-meal">Spawn Small Meal</button>
    <button class="spawn-btn" id="spawn-large-meal">Spawn Large Meal</button>
    <button class="spawn-btn" id="spawn-random-hero">Spawn Random Hero</button>
    <button class="spawn-btn" id="toggle-auto-spawn"
      style="margin-top: 5px; background: #660033; border-color: #ff0066;">Pause Auto-Spawn</button>
    <div style="margin-top: 10px; border-top: 1px solid rgba(170, 0, 255, 0.3); padding-top: 10px;">
      <label for="food-spawn-rate" style="font-size: 12px; color: #e0b3ff;">Spawn Frequency</label>
      <input type="range" id="food-spawn-rate" min="0" max="5" step="0.5" value="1" style="width: 100%; margin-top: 5px;">
    </div>
  </div>

  <div id="top-stats-panel">
    <!-- Top stats will be injected here by main.ts -->
  </div>

  <div id="info-panel">
    <!-- Hero info will be injected here by main.ts -->
  </div>

    <img src="images/foregroundLevel1.png" id="foregroundLevel1" />
