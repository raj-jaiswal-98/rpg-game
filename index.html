<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>2d world RPG</title>
    <style>
      body {
        margin: 0;
        padding: 0;
        background: linear-gradient(-45deg, #1a0033, #330066, #1a0033, #330066);
        background-size: 400% 400%;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        position: relative;
        overflow: hidden;
      }

      body::before {
        content: '';
        position: fixed;
        inset: 0;
        background-image: 
          radial-gradient(circle at 20% 30%, rgba(170, 0, 255, 0.3) 1px, transparent 1px),
          radial-gradient(circle at 60% 70%, rgba(170, 0, 255, 0.2) 1px, transparent 1px),
          radial-gradient(circle at 80% 20%, rgba(170, 0, 255, 0.25) 1px, transparent 1px);
        background-size: 200px 200px, 150px 150px, 180px 180px;
        animation: float 20s ease-in-out infinite;
        pointer-events: none;
      }

      @keyframes float {
        0%, 100% { transform: translateY(0px); }
        50% { transform: translateY(-20px); }
      }

      @keyframes pulse-glow {
        0%, 100% { 
          box-shadow: 0 0 20px rgba(170, 0, 255, 0.4);
        }
        50% { 
          box-shadow: 0 0 40px rgba(170, 0, 255, 0.8);
        }
      }

      #canvas {
        border: 3px solid #aa00ff;
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        animation: pulse-glow 3s ease-in-out infinite;
        z-index: 2;
      }

      .assets {
        display: none;
      }
      
      #camera-controls {
        position: absolute;
        top: 20px;
        right: 20px;
        background: rgba(0, 0, 0, 0.7);
        border: 2px solid #aa00ff;
        border-radius: 8px;
        padding: 15px;
        color: white;
        font-family: sans-serif;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 10px;
        z-index: 10;
        box-shadow: 0 0 15px rgba(170, 0, 255, 0.5);
      }

      .dpad {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 5px;
      }
      
      .dpad button {
        background: #330066;
        border: 1px solid #aa00ff;
        color: white;
        width: 30px;
        height: 30px;
        border-radius: 4px;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: bold;
      }
      .dpad button:hover {
        background: #aa00ff;
      }

      .zoom-controls {
        display: flex;
        flex-direction: column;
        align-items: center;
        width: 100%;
        margin-top: 10px;
      }
      .zoom-controls input {
        width: 100%;
        margin-top: 5px;
      }
    </style>
  </head>
  <body>
    <canvas id="canvas"></canvas>

    <div id="camera-controls">
      <div class="dpad">
        <div></div>
        <button id="camera-up">↑</button>
        <div></div>
        <button id="camera-left">←</button>
        <button id="camera-reset">⟲</button>
        <button id="camera-right">→</button>
        <div></div>
        <button id="camera-down">↓</button>
        <div></div>
      </div>
      <div class="zoom-controls">
        <label for="camera-zoom">Zoom</label>
        <input type="range" id="camera-zoom" min="0.5" max="3" step="0.1" value="1">
      </div>
    </div>

    <div class="assets">
      <img src="images/backgroundLevel1.png" id="backgroundLevel1" />
      <img src="images/foregroundLevel1.png" id="foregroundLevel1" />
      <img src="images/hero1.png" id="hero1" />
      <img src="images/hero2.png" id="hero2" />
    </div>

    <script type="module" src="main.js"></script>
  </body>
</html>
