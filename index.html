<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>2d world RPG</title>
    <style>
      body {
        margin: 0;
        padding: 0;
        background: linear-gradient(-45deg, #1a0033, #330066, #1a0033, #330066);
        background-size: 400% 400%;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        position: relative;
        overflow: hidden;
      }

      body::before {
        content: '';
        position: fixed;
        inset: 0;
        background-image: 
          radial-gradient(circle at 20% 30%, rgba(170, 0, 255, 0.3) 1px, transparent 1px),
          radial-gradient(circle at 60% 70%, rgba(170, 0, 255, 0.2) 1px, transparent 1px),
          radial-gradient(circle at 80% 20%, rgba(170, 0, 255, 0.25) 1px, transparent 1px);
        background-size: 200px 200px, 150px 150px, 180px 180px;
        animation: float 20s ease-in-out infinite;
        pointer-events: none;
      }

      @keyframes float {
        0%, 100% { transform: translateY(0px); }
        50% { transform: translateY(-20px); }
      }

      @keyframes pulse-glow {
        0%, 100% { 
          box-shadow: 0 0 20px rgba(170, 0, 255, 0.4);
        }
        50% { 
          box-shadow: 0 0 40px rgba(170, 0, 255, 0.8);
        }
      }

      #canvas {
        border: 3px solid #aa00ff;
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        animation: pulse-glow 3s ease-in-out infinite;
        z-index: 2;
      }

      .assets {
        display: none;
      }
    </style>
  </head>
  <body>
    <canvas id="canvas"></canvas>

    <div class="assets">
      <img src="images/backgroundLevel1.png" id="backgroundLevel1" />
      <img src="images/foregroundLevel1.png" id="foregroundLevel1" />
      <img src="images/hero1.png" id="hero1" />
      <img src="images/hero2.png" id="hero2" />
    </div>

    <script type="module" src="main.js"></script>
  </body>
</html>
